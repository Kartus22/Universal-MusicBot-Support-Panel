<!DOCTYPE html>
<html>
<head>
    <title>MusicBot Support Panel</title>
    <script type="text/javascript" src="/eel.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .container { max-width: 900px; margin: auto; padding-bottom: 80px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #3498db; }
        .btn { padding: 10px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .btn-sync { background: #9b59b6; color: white; flex-grow: 1; }
        .btn-upload { background: #2ecc71; color: white; width: 100%; margin-top: 15px; }
        .btn-delete-bulk { background: #e74c3c; color: white; margin-bottom: 15px; display: none; width: 100%; }
        .song-item { background: #2c2c2c; margin: 5px 0; padding: 12px; border-radius: 5px; display: flex; align-items: center; gap: 15px; }
        
        /* Angepasste Inputs für sauberes Layout */
        input[type="text"], input[type="password"], select { padding: 10px; background: #252525; color: white; border: 1px solid #444; border-radius: 5px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        input[type="checkbox"] { transform: scale(1.3); cursor: pointer; width: auto; margin-bottom: 0; }
        
        .sync-bar { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        #status-toast { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; background: #333; color: white; display: none; align-items: center; gap: 10px; z-index: 1000; border-bottom: 4px solid #3498db; }
        
        /* Fortschrittsanzeige */
        .progress-container { width: 100%; background-color: #252525; border-radius: 5px; margin-top: 15px; display: none; overflow: hidden;}
        .progress-bar { height: 20px; width: 0%; background-color: #2ecc71; transition: width 0.3s; }
        .progress-text { margin-top: 5px; font-size: 0.9em; color: #aaa; text-align: center; display: none; }

        /* Views */
        #setup-view, #main-view { display: none; }
    </style>
</head>
<body>
    <div id="status-toast"><span id="status-text">Processing...</span></div>

    <div id="setup-view" class="container">
        <div class="card" style="max-width: 400px; margin: 100px auto;">
            <h2>⚙️ Support Setup</h2>
            <select id="s_proto"><option value="SFTP">SFTP</option><option value="FTP">FTP</option></select>
            <input type="text" id="s_host" placeholder="Host" required>
            <input type="text" id="s_port" placeholder="Port" value="2022" required>
            <input type="text" id="s_user" placeholder="User" required>
            <input type="password" id="s_password" placeholder="Password" required>
            <input type="text" id="s_media" placeholder="Media Path" value="media" required>
            <input type="text" id="s_playlist" placeholder="Playlist Folder" value="config/playlists" required>
            <button onclick="saveSetup()" class="btn btn-sync" style="width: 100%">Save & Connect</button>
        </div>
    </div>

    <div id="main-view" class="container">
        <h1>🎵 MusicBot Support Panel</h1>
        <p id="conn-info">Connected: <b>...</b> | <a href="#" onclick="showSetup()" style="color:#3498db;">Settings</a></p>
        
        <div class="card" style="border-left-color: #9b59b6;">
            <h3>🔄 Synchronize Playlist</h3>
            <div class="sync-bar">
                <select id="playlist-select" style="flex-grow: 2; margin-bottom: 0;"></select>
                <button onclick="syncPlaylist()" class="btn btn-sync">Update Selected File</button>
            </div>
        </div>

        <div class="card">
            <h3>🚀 Upload</h3>
            <button id="upload-btn" onclick="triggerUpload()" class="btn btn-upload">Select Files to Upload...</button>
            
            <div id="progress-container" class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="progress-text" class="progress-text">0 / 0 - Preparing...</div>
        </div>

        <button id="bulk-delete-btn" onclick="bulkDelete()" class="btn btn-delete-bulk">🗑️ Delete Selected Songs</button>

        <div class="card" style="border-left-color: #f1c40f;" id="recent-box">
            <h3>✨ Recently Added</h3>
            <div id="recent-list"></div>
        </div>

        <div class="card" style="border-left-color: #95a5a6; display: flex; gap: 10px;">
            <input type="text" id="search-input" placeholder="Search..." style="margin-bottom:0;">
            <button class="btn" onclick="loadData()" style="background:#444; color:white;">🔍</button>
        </div>

        <div id="song-list"></div>
    </div>

    <script>
        // Init
        async function init() {
            let conf = await eel.check_config()();
            if (conf) {
                document.getElementById('s_proto').value = conf.proto;
                document.getElementById('s_host').value = conf.host;
                document.getElementById('s_port').value = conf.port;
                document.getElementById('s_user').value = conf.user;
                document.getElementById('s_media').value = conf.media_path;
                document.getElementById('s_playlist').value = conf.playlist_folder;
                showMain();
            } else {
                showSetup();
            }
        }

        function showSetup() {
            document.getElementById('setup-view').style.display = 'block';
            document.getElementById('main-view').style.display = 'none';
        }

        function showMain() {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            loadData();
        }

        function showStatus(text, autoHide=true) {
            let t = document.getElementById('status-toast');
            document.getElementById('status-text').innerText = text;
            t.style.display = 'flex';
            if(autoHide) setTimeout(() => { t.style.display = 'none'; }, 2500);
        }

        async function saveSetup() {
            showStatus("Connecting & Saving...", false);
            let conf = {
                proto: document.getElementById('s_proto').value,
                host: document.getElementById('s_host').value,
                port: document.getElementById('s_port').value,
                user: document.getElementById('s_user').value,
                password: document.getElementById('s_password').value,
                media_path: document.getElementById('s_media').value,
                playlist_folder: document.getElementById('s_playlist').value
            };
            let res = await eel.save_setup(conf)();
            if (res.success) { showStatus("Connected!"); showMain(); }
            else { showStatus("❌ Error: " + res.error, false); }
        }

        async function loadData() {
            showStatus("Loading data...", false);
            let search = document.getElementById('search-input').value;
            let data = await eel.get_data(search)();
            
            if (data.error) { showStatus("❌ " + data.error, false); return; }

            document.getElementById('conn-info').innerHTML = `Connected: <b>${data.conf.host} (${data.conf.proto})</b> | <a href="#" onclick="showSetup()" style="color:#3498db;">Settings</a>`;

            let pSelect = document.getElementById('playlist-select');
            pSelect.innerHTML = '<option value="" disabled selected>Select target .txt file...</option>';
            data.playlists.forEach(p => pSelect.innerHTML += `<option value="${p}">${p}</option>`);

            const renderSongs = (arr, containerId) => {
                let html = "";
                arr.forEach(s => {
                    html += `
                    <div class="song-item">
                        <input type="checkbox" class="song-checkbox" value="${s.name}" onchange="toggleBulk()">
                        <span style="flex-grow:1; word-break: break-all;">${s.name}</span>
                    </div>`;
                });
                document.getElementById(containerId).innerHTML = html;
            };

            renderSongs(data.songs_recent, 'recent-list');
            renderSongs(data.songs_all, 'song-list');
            
            document.getElementById('recent-box').style.display = search ? 'none' : 'block';
            toggleBulk();
            document.getElementById('status-toast').style.display = 'none';
        }

        function toggleBulk() {
            let count = document.querySelectorAll('.song-checkbox:checked').length;
            document.getElementById('bulk-delete-btn').style.display = count > 0 ? 'block' : 'none';
        }

        // --- FORTSCHRITTSANZEIGE FÜR PYTHON ---
        eel.expose(update_progress);
        function update_progress(current, total, filename) {
            let percent = (current / total) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').innerText = `${current} / ${total} - Uploading: ${filename}`;
        }

        async function triggerUpload() {
            showStatus("Select files in the popup...", false);
            
            document.getElementById('upload-btn').disabled = true;
            document.getElementById('upload-btn').style.opacity = "0.5";
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('progress-text').style.display = 'block';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-text').innerText = "Waiting for selection...";

            let res = await eel.upload_files()();

            document.getElementById('upload-btn').disabled = false;
            document.getElementById('upload-btn').style.opacity = "1";
            setTimeout(() => {
                document.getElementById('progress-container').style.display = 'none';
                document.getElementById('progress-text').style.display = 'none';
            }, 3000);

            if (res.status === "success") { showStatus("✅ Upload complete!"); loadData(); }
            else if (res.status === "cancelled") { document.getElementById('status-toast').style.display = 'none'; }
            else if (res.status === "error") { showStatus("❌ Upload failed: " + res.message, false); }
        }

        async function syncPlaylist() {
            let sel = document.getElementById('playlist-select').value;
            if(!sel) return alert("Select a playlist!");
            showStatus("Syncing...", false);
            let res = await eel.sync_playlist(sel)();
            if(res.status === "success") showStatus("✅ Synced!");
            else showStatus("❌ Failed: " + res.message, false);
        }

        async function bulkDelete() {
            let files = Array.from(document.querySelectorAll('.song-checkbox:checked')).map(cb => cb.value);
            if(!confirm(`Delete ${files.length} selected files?`)) return;
            showStatus("Deleting...", false);
            let res = await eel.delete_bulk(files)();
            if(res.status === "success") { showStatus("✅ Deleted!"); loadData(); }
            else { showStatus("❌ Failed: " + res.message, false); }
        }

        // Start
        init();
    </script>
</body>
</html>
